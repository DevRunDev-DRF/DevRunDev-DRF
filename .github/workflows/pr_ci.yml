name: Pull Request CI

on:
  pull_request:
    branches: ["develop", "main"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Python ${{ matrix.python-version }} 설정
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 환경 변수 설정 (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        echo "DEBUG=True" >> .env
        echo "SECRET_KEY=test-secret-key" >> .env
        echo "DATABASE_URL=sqlite:///db.sqlite3" >> .env
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env
        echo "IAMPORT_API_KEY=test-iamport-key" >> .env
        echo "IAMPORT_API_SECRET=test-iamport-secret" >> .env

    - name: 환경 변수 설정 (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "DEBUG=True" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "SECRET_KEY=test-secret-key" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "DATABASE_URL=sqlite:///db.sqlite3" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "IAMPORT_API_KEY=test-iamport-key" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "IAMPORT_API_SECRET=test-iamport-secret" | Out-File -FilePath .env -Encoding utf8 -Append

    - name: UV 설치
      run: |
        python -m pip install --upgrade pip
        pip install uv

    - name: 가상환경 생성 및 의존성 설치 (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        uv venv
        source .venv/bin/activate
        uv sync

    - name: 가상환경 생성 및 의존성 설치 (Windows)
      if: runner.os == 'Windows'
      run: |
        uv venv
        .\.venv\Scripts\activate.ps1
        uv sync

    - name: Django 테스트 실행 (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        source .venv/bin/activate
        python manage.py test

    - name: Django 테스트 실행 (Windows)
      if: runner.os == 'Windows'
      run: |
        .\.venv\Scripts\activate.ps1
        python manage.py test