name: Pull Request CI

on:
  pull_request:
    branches: ["develop", "main"]
  # PR이 아닌 직접 push된 브랜치에도 테스트 실행
  push:
    branches: ["develop", "main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        
    # UV 캐싱 설정
    - name: UV 캐시 설정
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-
          
    # UV 설치 및 가상환경 설정
    - name: UV 설치 및 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv venv
        source .venv/bin/activate || . .venv/bin/activate
        uv sync
        uv pip install flake8 black isort
        
    - name: 코드 포맷팅 검사 (Black)
      run: |
        source .venv/bin/activate || . .venv/bin/activate
        black --check . || echo "::warning::코드 스타일이 Black 규칙과 맞지 않습니다. 로컬에서 'black .'을 실행해 코드를 포맷팅하세요."
      
    - name: 임포트 정렬 검사 (isort)
      run: |
        source .venv/bin/activate || . .venv/bin/activate
        isort --check-only --profile black . || echo "::warning::임포트 순서가 isort 규칙과 맞지 않습니다. 로컬에서 'isort --profile black .'을 실행해 수정하세요."
      
    - name: 린트 검사 (flake8)
      run: |
        source .venv/bin/activate || . .venv/bin/activate
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "::warning::코드에 중요한 flake8 경고가 있습니다. 검토가 필요합니다."

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        
    # UV 캐싱 설정
    - name: UV 캐시 설정
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-security-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-security-
          
    # UV 설치 및 가상환경 설정
    - name: UV 설치 및 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv venv
        source .venv/bin/activate || . .venv/bin/activate
        uv sync
        uv pip install bandit safety
        
    - name: 보안 취약점 스캔 (Bandit)
      run: |
        source .venv/bin/activate || . .venv/bin/activate
        bandit -r . -ll || echo "::warning::코드에 보안 취약점이 발견되었습니다. 검토가 필요합니다."
      
    - name: 의존성 보안 스캔 (Safety)
      run: |
        source .venv/bin/activate || . .venv/bin/activate
        safety check || echo "::warning::의존성 패키지에 보안 취약점이 발견되었습니다. 검토가 필요합니다."

  test:
    needs: [lint, security]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
        # 테스트 개수를 줄이려면 특정 조합만 실행
        exclude:
          # Ubuntu에서만 모든 Python 버전 테스트, 다른 OS는 최신 버전만
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@v4

    - name: Python ${{ matrix.python-version }} 설정
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    # UV 캐싱 설정
    - name: UV 캐시 설정
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-python-${{ matrix.python-version }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-python-${{ matrix.python-version }}-uv-

    - name: 환경 변수 설정 (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        echo "DEBUG=True" >> .env
        echo "SECRET_KEY=test-secret-key" >> .env
        echo "DATABASE_URL=sqlite:///db.sqlite3" >> .env
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env
        echo "IAMPORT_API_KEY=test-iamport-key" >> .env
        echo "IAMPORT_API_SECRET=test-iamport-secret" >> .env

    - name: 환경 변수 설정 (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "DEBUG=True" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "SECRET_KEY=test-secret-key" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "DATABASE_URL=sqlite:///db.sqlite3" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "IAMPORT_API_KEY=test-iamport-key" | Out-File -FilePath .env -Encoding utf8 -Append
        echo "IAMPORT_API_SECRET=test-iamport-secret" | Out-File -FilePath .env -Encoding utf8 -Append

    - name: UV 설치 및 가상환경 세팅
      run: |
        python -m pip install --upgrade pip
        pip install uv

    - name: 가상환경 생성 및 의존성 설치 (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        uv venv
        source .venv/bin/activate
        uv sync
      
    - name: 가상환경 생성 및 의존성 설치 (Windows)
      if: runner.os == 'Windows'
      run: |
        uv venv
        .\.venv\Scripts\activate.ps1
        uv sync

    - name: Django 테스트 실행 (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        source .venv/bin/activate
        python manage.py test

    - name: Django 테스트 실행 (Windows)
      if: runner.os == 'Windows'
      run: |
        .\.venv\Scripts\activate.ps1
        python manage.py test
      
    - name: 테스트 커버리지 측정
      if: runner.os == 'Linux' && matrix.python-version == '3.13'
      run: |
        source .venv/bin/activate
        uv pip install coverage
        coverage run --source='.' manage.py test
        coverage report
        coverage xml
        
    - name: 커버리지 리포트 업로드
      if: runner.os == 'Linux' && matrix.python-version == '3.13'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false