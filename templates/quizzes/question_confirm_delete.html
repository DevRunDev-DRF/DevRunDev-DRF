{% extends 'base.html' %}

{% block title %}문제 삭제 - DevRunDev{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="bg-red-600 text-white p-4">
            <h1 class="text-xl font-bold">문제 삭제 확인</h1>
        </div>
        
        <div class="p-6 text-center">
            <svg class="w-16 h-16 mx-auto text-red-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            
            <h2 class="text-2xl font-bold mb-4">정말 이 문제를 삭제하시겠습니까?</h2>
            <p class="text-gray-600 mb-6">
                <strong>{{ question.text|truncatechars:50 }}</strong> 문제와 모든 선택지 및 응답 데이터가 영구적으로 삭제됩니다.<br>
                이 작업은 되돌릴 수 없습니다.
            </p>
            
            <div class="flex justify-center space-x-4">
                <a href="{% url 'quizzes:quiz-detail' question.quiz.id %}" class="px-6 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                    취소
                </a>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                        삭제하기
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
