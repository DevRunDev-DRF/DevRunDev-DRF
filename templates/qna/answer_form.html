{% extends "base.html" %}
{% load static %}

{% block title %}답변 수정{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">답변 수정</h1>
    
    <div class="mb-6">
        <div class="bg-gray-100 p-4 rounded-md">
            <h3 class="font-bold">{{ answer.question.title }}</h3>
            <p class="text-gray-600 mt-2 line-clamp-3">{{ answer.question.content|truncatechars:200 }}</p>
        </div>
    </div>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <div class="p-6">
            <form method="post" action="{% url 'qna:answer-edit' pk=answer.id %}">
                {% csrf_token %}
                
                <div class="mb-6">
                    <label for="content" class="block text-sm font-medium text-gray-700 mb-1">답변 내용 *</label>
                    <textarea name="content" id="content" rows="10" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" 
                              placeholder="답변 내용을 작성해주세요" required>{{ answer.content }}</textarea>
                </div>
                
                <div class="flex justify-end">
                    <a href="{% url 'qna:question-detail' pk=answer.question.id %}" 
                       class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded mr-2">
                        취소
                    </a>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                        수정 완료
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
