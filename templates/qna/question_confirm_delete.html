{% extends "base.html" %}
{% load static %}

{% block title %}질문 삭제 확인{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">질문 삭제 확인</h1>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <div class="p-6">
            <p class="mb-4">정말로 다음 질문을 삭제하시겠습니까?</p>
            <div class="p-4 mb-6 bg-gray-100 rounded-md">
                <h3 class="font-bold">{{ question.title }}</h3>
                <p class="text-gray-600 mt-2 line-clamp-3">{{ question.content|truncatechars:200 }}</p>
            </div>
            
            <div class="flex items-center text-sm text-red-600 mb-6">
                <svg class="h-5 w-5 mr-1" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zm-1 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"></path>
                </svg>
                <span>이 작업은 되돌릴 수 없으며, 질문에 달린 모든 답변도 함께 삭제됩니다.</span>
            </div>
            
            <div class="flex justify-end">
                <a href="{% url 'qna:question-detail' pk=question.id %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded mr-2">
                    취소
                </a>
                <form method="post" action="{% url 'qna:question-delete' pk=question.id %}">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                        삭제
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
