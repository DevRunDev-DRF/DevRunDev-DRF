{% extends 'base.html' %}

{% block title %}회원가입 - DevRunDev{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
    <h1 class="text-2xl font-bold mb-6 text-center">회원가입</h1>
    
    <form hx-post="{% url 'accounts:register' %}" hx-swap="outerHTML">
        {% csrf_token %}
        
        <div id="register-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded"></div>
        
        <div class="mb-4">
            <label for="email" class="block text-gray-700 font-medium mb-2">이메일</label>
            <input type="email" name="email" id="email" required
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="username" class="block text-gray-700 font-medium mb-2">사용자 이름</label>
            <input type="text" name="username" id="username" required
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="password" class="block text-gray-700 font-medium mb-2">비밀번호</label>
            <input type="password" name="password" id="password" required
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-6">
            <label for="password2" class="block text-gray-700 font-medium mb-2">비밀번호 확인</label>
            <input type="password" name="password2" id="password2" required
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
            회원가입
        </button>
    </form>
    
    <div class="mt-6 text-center">
        <p class="text-gray-600">이미 계정이 있으신가요? <a href="{% url 'accounts:login' %}" class="text-blue-600 hover:underline">로그인</a></p>
    </div>
</div>
{% endblock %}
